# Puerto único para el microservicio de Personalización
server.port=8088

# Conexión a Laragon MySQL (Puerto 3306) creando la BD de personalizacion
spring.datasource.url=jdbc:mysql://localhost:3306/petbox_personalizacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true