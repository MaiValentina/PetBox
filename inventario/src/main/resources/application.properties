# Puerto único para el microservicio de Inventario
server.port=8084

# Conexión a Laragon MySQL (Crea la base de datos si no existe)
spring.datasource.url=jdbc:mysql://localhost:3306/petbox_inventario?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true